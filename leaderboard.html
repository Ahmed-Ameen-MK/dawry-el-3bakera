<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المتصدرون - دوري العباقرة</title>
<link rel="icon" type="image/png" href="/icon.png">
<meta name="google-site-verification" content="6nlZ7R-1cDpMGzaXz-gFXbkZse5Py7SEpvhwygR4QDU" />
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f7; --bg3: #e8e8ed;
    --ink: #1d1d1f; --ink2: #3d3d3f; --ink3: #6e6e73;
    --line: #d2d2d7; --line2: rgba(0,0,0,0.06);
    --blue: #0071e3; --blue-hover: #0077ed;
    --green: #1d8348; --red: #c0392b;
    --gold: #b5882e; --gold-bg: #fdf6e3;
    --radius: 18px; --radius-sm: 10px;
    --shadow: 0 2px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'El Messiri',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }
  .container { max-width:1100px; margin:0 auto; padding:0 24px; }

  /* HEADER */
  header { border-bottom:1px solid var(--line); padding:0 24px; position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
  .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:52px; }
  .brand { font-size:17px; font-weight:700; letter-spacing:-0.3px; color:var(--ink); display:flex; align-items:center; gap:8px; text-decoration:none; }
  .brand i { color:var(--blue); font-size:15px; }
  nav { display:flex; gap:4px; }
  nav a, nav button {
    background:none; border:none; color:var(--ink3); padding:6px 14px; border-radius:20px;
    cursor:pointer; font-family:'El Messiri',sans-serif; font-size:14px; font-weight:500;
    transition:all 0.15s; display:flex; align-items:center; gap:6px; text-decoration:none;
  }
  nav a:hover, nav button:hover { background:var(--bg2); color:var(--ink); }
  nav a.active, nav button.active { background:var(--ink); color:var(--bg); }
  nav a i, nav button i { font-size:13px; }

  /* CARD */
  .card { background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:32px; margin-bottom:16px; box-shadow:var(--shadow); }
  .card-header { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
  .card-header .icon-wrap { width:40px; height:40px; border-radius:10px; background:var(--bg2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--blue); font-size:16px; }
  .card-header h2 { font-size:20px; font-weight:700; color:var(--ink); letter-spacing:-0.3px; }
  .section { padding:40px 0; }

  /* LEADERBOARD */
  .lb-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--line2); transition:background 0.15s; border-radius:var(--radius-sm); padding-left:8px; padding-right:8px; }
  .lb-row:hover { background:var(--bg2); }
  .lb-rank { width:32px; text-align:center; font-weight:800; font-size:16px; color:var(--ink3); flex-shrink:0; }
  .lb-rank.gold { color:#c9a227; }
  .lb-rank.silver { color:#909090; }
  .lb-rank.bronze { color:#b07d4a; }
  .lb-avatar { width:40px; height:40px; border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; flex-shrink:0; overflow:hidden; border:2px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,0.12); }
  .lb-info { flex:1; min-width:0; }
  .lb-name { font-size:15px; font-weight:600; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-country { font-size:12px; color:var(--ink3); margin-top:1px; }
  .lb-pts { font-size:15px; font-weight:700; color:var(--blue); white-space:nowrap; flex-shrink:0; }

  @media (max-width:520px) {
    nav a .nav-text, nav button .nav-text { display:none; }
    nav a, nav button { padding:6px 10px; }
  }

  /* FOOTER */
  footer { border-top:1px solid var(--line); background:var(--bg2); margin-top:40px; padding:32px 24px 24px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="brand">
      <i class="fa-solid fa-crown"></i>
      دوري العباقرة
    </a>
    <nav>
      <a href="index.html" id="nav-home">
        <i class="fa-solid fa-house"></i> <span class="nav-text">الرئيسية</span>
      </a>
      <a href="leaderboard.html" class="active" id="nav-lb">
        <i class="fa-solid fa-ranking-star"></i> <span class="nav-text">المتصدرون</span>
      </a>
      <a href="store.html" id="nav-store">
        <i class="fa-solid fa-store"></i> <span class="nav-text">المتجر</span>
      </a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="section">
    <div class="card">
      <div class="card-header">
        <div class="icon-wrap"><i class="fa-solid fa-ranking-star"></i></div>
        <h2>لوحة المتصدرين</h2>
      </div>
      <div style="margin-bottom:20px;position:relative">
        <input type="text" id="lb-search" placeholder="ابحث عن لاعب..." oninput="filterLeaderboard()"
          style="width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:11px 14px 11px 40px;color:var(--ink);font-family:'El Messiri',sans-serif;font-size:15px;outline:none;transition:border-color 0.15s,box-shadow 0.15s"
          onfocus="this.style.borderColor='var(--blue)';this.style.boxShadow='0 0 0 3px rgba(0,113,227,0.12)'"
          onblur="this.style.borderColor='';this.style.boxShadow=''">
        <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:14px;pointer-events:none"></i>
      </div>
      <div id="lb-list"><div style="text-align:center;color:var(--ink3);padding:40px">جاري التحميل...</div></div>
    </div>
  </div>
</div>

<footer>
  <div style="max-width:1100px;margin:0 auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-weight:700;font-size:15px;color:var(--ink)">دوري العباقرة</span>
      </div>
      <nav style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
        <a href="privacy-policy.html" style="color:var(--ink3);font-size:13px;font-weight:500;text-decoration:none;padding:5px 12px;border-radius:20px;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;"
          onmouseover="this.style.background='var(--bg3)';this.style.color='var(--ink)'"
          onmouseout="this.style.background='transparent';this.style.color='var(--ink3)'">
          <i class="fa-solid fa-shield-halved" style="font-size:11px"></i> سياسة الخصوصية
        </a>
        <span style="color:var(--line);font-size:12px">|</span>
        <a href="aboutus.html" style="color:var(--ink3);font-size:13px;font-weight:500;text-decoration:none;padding:5px 12px;border-radius:20px;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;"
          onmouseover="this.style.background='var(--bg3)';this.style.color='var(--ink)'"
          onmouseout="this.style.background='transparent';this.style.color='var(--ink3)'">
          <i class="fa-solid fa-circle-info" style="font-size:11px"></i> من نحن
        </a>
      </nav>
    </div>
    <div style="border-top:1px solid var(--line2);padding-top:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <p style="font-size:12px;color:var(--ink3);">Copyright © 2026 دوري العباقرة. جميع الحقوق محفوظة.</p>
      <p dir="ltr" style="font-size:12px;">&lt; Developed by = " <a style="text-decoration:none;color:pink;" href="https://nafezly.com/service/71680?ref=69f507b3714b4"><b style="color:red;">A.ameen</b></a> " /&gt;</p>
      <p style="font-size:12px;color:var(--ink3);">صُنع في مصر</p>
    </div>
  </div>
</footer>

<script>
const SB_URL = 'https://spbbtsrabohqaspqzsph.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNwYmJ0c3JhYm9ocWFzcHF6c3BoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNTk4ODEsImV4cCI6MjA5MzYzNTg4MX0.SfgtGV2RpvmpthbR9D036bXWJZdBkDQFrUJbqsOjHsI';
const Q_HEADERS = { 'Content-Type':'application/json', 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };

async function sbFetch(path) {
  try {
    const res = await fetch(SB_URL + path, { headers: Q_HEADERS });
    const text = await res.text();
    return JSON.parse(text);
  } catch(e) { return null; }
}

let lbAllData = [];

async function loadLeaderboard() {
  const data = await sbFetch('/rest/v1/system?select=name,country,level,avatar_url&order=level.desc&limit=100');
  const el = document.getElementById('lb-list');
  if (!data || data.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--ink3);padding:40px">لا يوجد لاعبون بعد</div>';
    return;
  }
  lbAllData = data;
  document.getElementById('lb-search').value = '';
  renderLeaderboard(data);
}

function filterLeaderboard() {
  const q = document.getElementById('lb-search').value.trim().toLowerCase();
  if (!q) return renderLeaderboard(lbAllData);
  const filtered = lbAllData.filter(u => (u.name||'').toLowerCase().includes(q) || (u.country||'').toLowerCase().includes(q));
  renderLeaderboard(filtered, q);
}

function renderLeaderboard(data, highlight='') {
  const el = document.getElementById('lb-list');
  if (!data || data.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--ink3);padding:40px">لا توجد نتائج مطابقة</div>';
    return;
  }
  const rankClass = ['gold','silver','bronze'];
  el.innerHTML = data.map((u, i) => {
    const globalRank = lbAllData.indexOf(u);
    const displayRank = globalRank + 1;
    let nameDisplay = u.name || 'لاعب';
    if (highlight) {
      const regex = new RegExp(`(${highlight.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      nameDisplay = nameDisplay.replace(regex, '<mark style="background:#fff3b0;border-radius:3px;padding:0 1px">$1</mark>');
    }
    return `
    <div class="lb-row" style="cursor:pointer" onclick="window.location.href='/abqari/${(u.name||'').trim().replace(/\s+/g,'-')}'">
      <div class="lb-rank ${rankClass[globalRank]||''}">
        ${globalRank===0?'<i class="fa-solid fa-medal"></i>':globalRank===1?'<i class="fa-solid fa-medal" style="color:#aaa"></i>':globalRank===2?'<i class="fa-solid fa-medal" style="color:#b07d4a"></i>':displayRank}
      </div>
      <div class="lb-avatar">${u.avatar_url?`<img src="${u.avatar_url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;display:block;" onerror="this.parentElement.textContent='${u.name?u.name[0].toUpperCase():'?'}'">`:(u.name?u.name[0].toUpperCase():'?')}</div>
      <div class="lb-info">
        <div class="lb-name">${nameDisplay}</div>
        <div class="lb-country">${u.country||''}</div>
      </div>
      <div class="lb-pts">${u.level||0} <span style="font-size:11px;color:var(--ink3);font-weight:400">نقطة صدارة</span></div>
    </div>`;
  }).join('');
}

loadLeaderboard();
</script>
</body>
</html>
