<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دوري العباقرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C89B1A;
    --deep: #0A0A1A;
    --surface: #111128;
    --surface2: #1A1A35;
    --surface3: #222245;
    --accent: #6C63FF;
    --accent2: #FF6B6B;
    --text: #F0F0FF;
    --muted: #8888AA;
    --success: #2ECC71;
    --danger: #E74C3C;
    --border: rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(245,200,66,0.06) 0%, transparent 40%);
  }
  .container { max-width: 900px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* === HEADER === */
  header {
    text-align: center;
    padding: 50px 20px 30px;
    position: relative;
  }
  .logo-crown { font-size: 48px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  header h1 {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  header p { color: var(--muted); margin-top: 8px; font-size: 15px; }

  /* === NAV === */
  nav {
    display: flex; gap: 8px; justify-content: center;
    margin: 20px 0 30px; flex-wrap: wrap;
  }
  nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    transition: all 0.2s;
  }
  nav button.active, nav button:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* === PAGES === */
  .page { display: none; animation: fadeIn 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* === CARD === */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 22px; font-weight: 700; margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
    color: var(--gold);
  }

  /* === FORM === */
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }
  .form-group input::placeholder { color: var(--muted); }

  .btn {
    width: 100%; padding: 14px;
    border-radius: 12px; border: none;
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #9B5DE5);
    color: #fff;
  }
  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--deep);
  }
  .btn-gold:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-danger {
    background: linear-gradient(135deg, var(--danger), #C0392B);
    color: #fff;
    margin-top: 8px;
  }

  .msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-top: 12px; text-align: center; }
  .msg.error { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); color: var(--accent2); }
  .msg.success { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.3); color: var(--success); }
  .msg.info { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3); color: #aaa8ff; }

  /* === DASHBOARD === */
  .user-banner {
    background: linear-gradient(135deg, var(--surface2), var(--surface3));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .avatar {
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 900; color: #fff;
    flex-shrink: 0;
  }
  .user-info { flex: 1; }
  .user-info h3 { font-size: 20px; font-weight: 700; }
  .user-info p { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .points-badge {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--deep);
    padding: 8px 18px; border-radius: 50px;
    font-weight: 900; font-size: 16px;
  }

  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px; text-align: center;
  }
  .stat-card .num { font-size: 28px; font-weight: 900; color: var(--gold); }
  .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* === PLAY BUTTON === */
  .play-section { text-align: center; padding: 20px 0; }
  .btn-play {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--deep);
    border: none;
    padding: 20px 50px;
    border-radius: 60px;
    font-family: 'Cairo', sans-serif;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 0 40px rgba(245,200,66,0.25);
    display: inline-flex; align-items: center; gap: 12px;
  }
  .btn-play:hover { transform: scale(1.05); box-shadow: 0 0 60px rgba(245,200,66,0.4); }
  .btn-play:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .searching-anim {
    display: none; margin-top: 20px;
    align-items: center; justify-content: center; gap: 10px;
    color: var(--gold); font-size: 16px;
  }
  .searching-anim.show { display: flex; }
  .dots span {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: var(--gold);
    animation: dot 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

  /* === MATCH === */
  #match-page .vs-header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap; gap: 12px;
  }
  .player-side { text-align: center; flex: 1; }
  .player-side .p-name { font-size: 16px; font-weight: 700; }
  .player-side .p-pts { font-size: 28px; font-weight: 900; color: var(--gold); }
  .player-side .p-country { font-size: 12px; color: var(--muted); }
  .vs-badge {
    background: var(--accent);
    color: #fff; font-weight: 900;
    padding: 8px 16px; border-radius: 10px;
    font-size: 18px;
  }

  .timer-bar-wrap { margin-bottom: 20px; }
  .timer-top { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .timer-bar-bg {
    height: 8px; background: var(--surface2);
    border-radius: 10px; overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--success), var(--gold));
    border-radius: 10px;
    transition: width 1s linear, background 0.5s;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .question-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .question-card .q-text { font-size: 18px; font-weight: 600; line-height: 1.6; margin-bottom: 24px; }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: right;
    display: flex; align-items: center; gap: 10px;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .option-btn:disabled { cursor: not-allowed; opacity: 0.6; }
  .option-btn.correct { background: rgba(46,204,113,0.2); border-color: var(--success); color: var(--success); }
  .option-btn.wrong { background: rgba(231,76,60,0.2); border-color: var(--danger); color: var(--danger); }
  .option-label {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface3); display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .status-bar { text-align: center; font-size: 14px; color: var(--muted); padding: 10px; }

  /* === LEADERBOARD === */
  .lb-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .lb-row:hover { background: var(--surface2); border-radius: 10px; }
  .lb-rank { width: 30px; text-align: center; font-weight: 900; font-size: 16px; }
  .lb-rank.gold { color: #F5C842; }
  .lb-rank.silver { color: #C0C0C0; }
  .lb-rank.bronze { color: #CD7F32; }
  .lb-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0;
  }
  .lb-info { flex: 1; }
  .lb-info .lb-name { font-weight: 600; font-size: 15px; }
  .lb-info .lb-country { font-size: 12px; color: var(--muted); }
  .lb-pts { font-weight: 900; font-size: 18px; color: var(--gold); }

  .tab-switcher {
    display: flex; gap: 4px; background: var(--surface2);
    border-radius: 12px; padding: 4px; margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1; padding: 10px;
    border-radius: 10px; border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
  }

  .win-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
  }
  .win-overlay.show { display: flex; }
  .win-box {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    animation: popIn 0.4s ease;
  }
  @keyframes popIn { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
  .win-emoji { font-size: 64px; margin-bottom: 16px; }
  .win-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
  .win-sub { color: var(--muted); margin-bottom: 24px; }

  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<div class="stars"></div>

<div class="win-overlay" id="win-overlay">
  <div class="win-box">
    <div class="win-emoji" id="win-emoji">🏆</div>
    <div class="win-title" id="win-title">أنت الفائز!</div>
    <div class="win-sub" id="win-sub"></div>
    <button class="btn btn-gold" onclick="closeMatch()">العودة للرئيسية</button>
  </div>
</div>

<header>
  <div class="logo-crown">👑</div>
  <h1>دوري العباقرة</h1>
  <p>تحدَّ العالم واثبت تفوقك!</p>
</header>

<div class="container">
  <nav id="main-nav">
    <button onclick="showPage('home')" class="active" id="nav-home">🏠 الرئيسية</button>
    <button onclick="showPage('leaderboard')" id="nav-lb">🏆 المتصدرون</button>
    <button onclick="showPage('profile')" id="nav-profile" style="display:none">👤 حسابي</button>
  </nav>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">

    <!-- Auth Section -->
    <div id="auth-section">
      <div class="tab-switcher" style="max-width:400px;margin:0 auto 20px">
        <button class="tab-btn active" onclick="switchAuthTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchAuthTab('register')">إنشاء حساب</button>
      </div>

      <!-- Login -->
      <div class="card" id="login-form" style="max-width:400px;margin:0 auto">
        <h2>🔐 تسجيل الدخول</h2>
        <div class="form-group">
          <label>البريد الإلكتروني</label>

        <div class="form-group">

          <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="doLogin()">دخول</button>
        <div id="login-msg"></div>
      </div>

      <!-- Register -->
      <div class="card" id="register-form" style="max-width:400px;margin:0 auto;display:none">
        <h2>✨ إنشاء حساب</h2>
        <div class="form-group">
          <label>الاسم</label>
          <input type="text" id="reg-name" placeholder="اسمك الكامل">
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="reg-email" placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="reg-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="doRegister()">إنشاء الحساب</button>
        <div id="reg-msg"></div>
      </div>
    </div>

    <!-- Dashboard (after login) -->
    <div id="dashboard-section" style="display:none">
      <div class="user-banner">
        <div class="avatar" id="dash-avatar"></div>
        <div class="user-info">
          <h3 id="dash-name"></h3>
          <p id="dash-email"></p>
          <p id="dash-country" style="margin-top:4px;font-size:14px;color:var(--gold)"></p>
        </div>
        <div class="points-badge">⭐ <span id="dash-points">0</span> نقطة</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="num" id="stat-pts">0</div>
          <div class="lbl">نقاطك الكلية</div>
        </div>
        <div class="stat-card">
          <div class="num" id="stat-rank">#-</div>
          <div class="lbl">ترتيبك</div>
        </div>
        <div class="stat-card">
          <div class="num">🌍</div>
          <div class="lbl" id="stat-country"></div>
        </div>
      </div>

      <div class="play-section">
        <button class="btn-play" id="play-btn" onclick="startSearch()">
          ⚡ العب مباراة
        </button>
        <div class="searching-anim" id="searching-anim">
          <div class="dots"><span></span><span></span><span></span></div>
          <span id="search-text">جاري البحث عن خصم...</span>
        </div>
        <div id="search-msg"></div>
        <button class="btn btn-danger" id="cancel-btn" style="display:none;max-width:200px;margin:10px auto" onclick="cancelSearch()">إلغاء البحث</button>
      </div>
    </div>
  </div>

  <!-- MATCH PAGE -->
  <div class="page" id="page-match">
    <div class="vs-header">
      <div class="player-side">
        <div class="p-name" id="my-name-m"></div>
        <div class="p-pts" id="my-pts-m">0</div>
        <div class="p-country" id="my-country-m"></div>
      </div>
      <div>
        <div class="vs-badge">VS</div>
        <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--muted)" id="match-timer-display">00:00</div>
      </div>
      <div class="player-side">
        <div class="p-name" id="opp-name-m"></div>
        <div class="p-pts" id="opp-pts-m">0</div>
        <div class="p-country" id="opp-country-m"></div>
      </div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-top">
        <span>وقت السؤال</span>
        <span id="q-timer-text">60</span>
      </div>
      <div class="timer-bar-bg">
        <div class="timer-bar-fill" id="q-timer-bar" style="width:100%"></div>
      </div>
    </div>

    <div class="question-card">
      <div class="q-num" id="q-num">السؤال 1</div>
      <div class="q-text" id="q-text">جاري تحميل السؤال...</div>
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="status-bar" id="match-status"></div>
  </div>

  <!-- LEADERBOARD PAGE -->
  <div class="page" id="page-leaderboard">
    <div class="card">
      <h2>🏆 لوحة المتصدرين</h2>
      <div id="lb-list"><div style="text-align:center;color:var(--muted);padding:40px">جاري التحميل...</div></div>
    </div>
  </div>

  <!-- PROFILE PAGE -->
  <div class="page" id="page-profile">
    <div class="card">
      <h2>👤 حسابي</h2>
      <div id="profile-info"></div>
      <button class="btn btn-danger" onclick="doLogout()" style="margin-top:20px">تسجيل الخروج</button>
    </div>
  </div>

</div>

let currentUser = null;
let matchInterval = null;
let qTimerInterval = null;
let matchData = null;
let currentQ = null;

let oppMatchPts = 0;

// ==================== UTILS ====================
async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + path, {
    ...opts,
    headers: { ...Q_HEADERS, ...(opts.headers||{}) }
  });
  const text = await res.text();
  try {
    const json = JSON.parse(text);
    if (!res.ok) {
      console.error('Supabase Error:', res.status, json);
      return { __error: true, status: res.status, ...json };
    }
    return json;
  } catch(e) {
    console.error('Parse error:', text);
    return null;
  }
}

async function getCountry() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    return (d.country_name || 'غير معروف') + ' ' + (d.country_code ? countryFlag(d.country_code) : '');
  } catch { return 'غير معروف 🌍'; }
}

function countryFlag(cc) {
  return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt()));
}

function showMsg(el, txt, type) {
  el.innerHTML = `<div class="msg ${type}">${txt}</div>`;
}

// ==================== PAGES ====================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const nb = document.getElementById('nav-' + (name === 'leaderboard' ? 'lb' : name === 'profile' ? 'profile' : 'home'));
  if (nb) nb.classList.add('active');
  if (name === 'leaderboard') loadLeaderboard();
  if (name === 'profile') loadProfile();
}

function switchAuthTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
}

// ==================== AUTH ====================
async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value.trim();
  const msgEl = document.getElementById('reg-msg');
  if (!name || !email || !pass) return showMsg(msgEl, 'يرجى ملء جميع الحقول', 'error');

  showMsg(msgEl, 'جاري إنشاء الحساب...', 'info');
  const country = await getCountry();

  const check = await sbFetch(`/rest/v1/system?email=eq.${encodeURIComponent(email)}&select=id`, { method: 'GET' });
  if (check && check.length > 0) return showMsg(msgEl, 'هذا البريد مسجل مسبقاً', 'error');

  const newId = Date.now() + Math.floor(Math.random() * 9999);
  const res = await sbFetch('/rest/v1/system', {
    method: 'POST',
    body: JSON.stringify({ id: newId, name, email, password: pass, country, match: 'off', points: 0, question: 0, answer: 'none' })
  });

  if (res && res[0] && res[0].id) {
    showMsg(msgEl, 'تم إنشاء الحساب بنجاح! 🎉', 'success');
    setTimeout(() => { loginUser(res[0]); }, 1000);
  } else if (res && res.__error) {
    const errMsg = res.message || res.hint || res.details || JSON.stringify(res);
    showMsg(msgEl, `خطأ من السيرفر: ${errMsg}`, 'error');
    console.error('Register error details:', res);
  } else {
    showMsg(msgEl, `حدث خطأ غير معروف: ${JSON.stringify(res)}`, 'error');
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const msgEl = document.getElementById('login-msg');
  if (!email || !pass) return showMsg(msgEl, 'يرجى ملء جميع الحقول', 'error');

  showMsg(msgEl, 'جاري التحقق...', 'info');
  const res = await sbFetch(`/rest/v1/system?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(pass)}&select=*`, { method: 'GET' });

  if (res && res.length > 0) {
    loginUser(res[0]);
  } else {
    showMsg(msgEl, 'البريد أو كلمة المرور غير صحيحة', 'error');
  }
}

// ==================== MATCHMAKING ====================
async function startSearch() {
  if (!currentUser) return;
  document.getElementById('play-btn').disabled = true;
  document.getElementById('searching-anim').classList.add('show');
  document.getElementById('cancel-btn').style.display = '';
  document.getElementById('search-msg').innerHTML = '';

  await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
    method: 'PATCH',
    body: JSON.stringify({ match: 'searching' })
  });

  let countdown = 3;
  const countEl = document.getElementById('search-text');
  searchPollInterval = setInterval(async () => {
    countdown--;
    if (countdown > 0) { countEl.textContent = `جاري البحث... (${countdown})`; return; }
    clearInterval(searchPollInterval);
    await matchMake();
  }, 1000);
}

async function matchMake() {
  const searchers = await sbFetch(`/rest/v1/system?match=eq.searching&select=id,name,country,points&order=id.asc`, { method: 'GET' });
  if (!searchers) return fallbackSearch();

  const myIdx = searchers.findIndex(u => u.id === currentUser.id);
  if (myIdx === -1) return fallbackSearch();

  if (searchers.length < 2) return fallbackSearch();

  // pair: 0 with 1, 2 with 3, etc.
  if (myIdx % 2 !== 0) {
    // I'm the even-indexed (second in pair), wait for my partner to set me
    startWaitingForMatch();
    return;
  }

  const partner = searchers[myIdx + 1];
  if (!partner) return fallbackSearch();

  // I'm the smaller ID (first in pair) — I initiate
  await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
    method: 'PATCH', body: JSON.stringify({ match: String(partner.id) })
  });
  await sbFetch(`/rest/v1/system?id=eq.${partner.id}`, {
    method: 'PATCH', body: JSON.stringify({ match: String(currentUser.id) })
  });

  startMatch(partner);
}

async function startWaitingForMatch() {
  let tries = 0;
  const poll = setInterval(async () => {
    tries++;
    if (tries > 20) { clearInterval(poll); fallbackSearch(); return; }
    const me = await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}&select=match,name,country,points`, { method: 'GET' });
    if (me && me[0] && me[0].match && me[0].match !== 'searching' && me[0].match !== 'off') {
      clearInterval(poll);
      const oppId = me[0].match;
      const opp = await sbFetch(`/rest/v1/system?id=eq.${oppId}&select=id,name,country,points`, { method: 'GET' });
      if (opp && opp[0]) startMatch(opp[0]);
    }
  }, 1500);
}

function fallbackSearch() {
  document.getElementById('search-text').textContent = 'لا يوجد مباراة متاحة الآن، أعد المحاولة لاحقاً';
  document.getElementById('cancel-btn').style.display = 'none';
  setTimeout(() => {
    document.getElementById('searching-anim').classList.remove('show');
    document.getElementById('play-btn').disabled = false;
    document.getElementById('search-text').textContent = 'جاري البحث عن خصم...';
  }, 3000);
  sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
    method: 'PATCH', body: JSON.stringify({ match: 'off' })
  });
}

async function cancelSearch() {
  clearInterval(searchPollInterval);
  if (currentUser) {
    await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
      method: 'PATCH', body: JSON.stringify({ match: 'off' })
    });
  }
  document.getElementById('searching-anim').classList.remove('show');
  document.getElementById('play-btn').disabled = false;
  document.getElementById('cancel-btn').style.display = 'none';
}

// ==================== MATCH ====================
let opponent = null;

function startMatch(opp) {
  opponent = opp;
  myMatchPts = 0;
  oppMatchPts = 0;
  usedQIds = [];
  matchStartTime = Date.now();

  document.getElementById('my-name-m').textContent = currentUser.name;
  document.getElementById('my-pts-m').textContent = '0';
  document.getElementById('my-country-m').textContent = currentUser.country || '';
  document.getElementById('opp-name-m').textContent = opp.name;
  document.getElementById('opp-pts-m').textContent = '0';
  document.getElementById('opp-country-m').textContent = opp.country || '';

  showPage('match');

  // 15-hour match timer
  matchTotalTimer = setInterval(() => {
    const elapsed = Date.now() - matchStartTime;
    const remaining = (15 * 60 * 60 * 1000) - elapsed;
    if (remaining <= 0) { endMatch('time'); return; }
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    document.getElementById('match-timer-display').textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);

  // determine who picks question
  const iAmSmaller = currentUser.id < opponent.id;
  if (iAmSmaller) {
    loadNextQuestion();
  } else {
    pollForQuestion();
  }
}

async function loadNextQuestion() {
  const available = QUESTIONS.filter(q => !usedQIds.includes(q.id));
  if (!available.length) { endMatch('time'); return; }
  const q = available[Math.floor(Math.random() * available.length)];
  usedQIds.push(q.id);
  currentQ = q;
  answered = false;

  // أرسل رقم السؤال للاعبين مع إعادة تعيين الإجابة
  await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
    method: 'PATCH', body: JSON.stringify({ question: Number(q.id), answer: 'none' })
  });
  await sbFetch(`/rest/v1/system?id=eq.${opponent.id}`, {
    method: 'PATCH', body: JSON.stringify({ question: Number(q.id), answer: 'none' })
  });

  renderQuestion(q);
  startQTimer();
  pollForOpponentAnswer();
}

function pollForQuestion() {
  let tries = 0;
  const lastQ = currentQ ? currentQ.id : 0;
  const poll = setInterval(async () => {
    tries++;
    if (tries > 30) { clearInterval(poll); return; }
    const me = await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}&select=question,answer`, { method: 'GET' });
    if (me && me[0] && me[0].question && me[0].question !== 0 && me[0].question !== lastQ && me[0].answer === 'none') {
      clearInterval(poll);
      const q = QUESTIONS.find(q => q.id === Number(me[0].question));
      if (!q) return;
      usedQIds.push(q.id);
      currentQ = q;
      answered = false;
      renderQuestion(q);
      startQTimer();
      pollForOpponentAnswer();
    }
  }, 1500);
}

function renderQuestion(q) {
  document.getElementById('q-num').textContent = `السؤال ${usedQIds.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('match-status').textContent = '';
  const labels = ['أ', 'ب', 'ج', 'د'];
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span>${opt}`;
    btn.onclick = () => answerQ(i, btn);
    grid.appendChild(btn);
  });
}

function startQTimer() {
  clearInterval(qTimerInterval);
  let t = 60;
  document.getElementById('q-timer-text').textContent = t;
  document.getElementById('q-timer-bar').style.width = '100%';
  document.getElementById('q-timer-bar').style.background = 'linear-gradient(90deg, var(--success), var(--gold))';

  qTimerInterval = setInterval(() => {
    t--;
    document.getElementById('q-timer-text').textContent = t;
    document.getElementById('q-timer-bar').style.width = (t / 60 * 100) + '%';
    if (t <= 15) document.getElementById('q-timer-bar').style.background = 'var(--danger)';
    if (t <= 0) {
      clearInterval(qTimerInterval);
      document.getElementById('match-status').textContent = '⏰ انتهى وقت السؤال!';
      disableOptions();
      setTimeout(() => nextQuestion(), 2000);
    }
  }, 1000);
}

async function answerQ(idx, btn) {
  if (answered) return;
  answered = true;
  clearInterval(qTimerInterval);
  disableOptions();

  const correct = idx === currentQ.a;
  btn.classList.add(correct ? 'correct' : 'wrong');

  if (correct) {
    myMatchPts += 10;
    document.getElementById('my-pts-m').textContent = myMatchPts;
    document.getElementById('match-status').textContent = '✅ إجابة صحيحة! +10 نقاط';
    await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
      method: 'PATCH', body: JSON.stringify({ answer: 'correct', points: (currentUser.points || 0) + 10 })
    });
    currentUser.points = (currentUser.points || 0) + 10;
    if (myMatchPts >= 50) {
      // أنا وصلت 50 — أنا الفائز
      setTimeout(() => endMatch('win'), 1500);
      return;
    }
    // انتقل للسؤال التالي بعد انتظار poll المنافس
  } else {
    myMatchPts = Math.max(0, myMatchPts - 5);
    document.getElementById('my-pts-m').textContent = myMatchPts;
    document.getElementById('match-status').textContent = '❌ إجابة خاطئة! -5 نقاط';
    await sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
      method: 'PATCH', body: JSON.stringify({ answer: 'wrong', points: Math.max(0, (currentUser.points || 0) - 5) })
    });
    currentUser.points = Math.max(0, (currentUser.points || 0) - 5);
    // show correct answer
    const btns = document.querySelectorAll('.option-btn');
    btns[currentQ.a].classList.add('correct');
  }
}

function pollForOpponentAnswer() {
  let tries = 0;
  const poll = setInterval(async () => {
    tries++;
    if (tries > 40) { clearInterval(poll); nextQuestion(); return; }
    const opp = await sbFetch(`/rest/v1/system?id=eq.${opponent.id}&select=answer,points`, { method: 'GET' });
    if (opp && opp[0] && opp[0].answer && opp[0].answer !== 'none') {
      clearInterval(poll);
      const newOppPts = opp[0].points || 0;
      const oppAns = opp[0].answer;
      if (oppAns === 'correct') {
        if (!answered) {
          // خصمك خطف السؤال — أضف 10 نقاط له وأظهر رسالة الخطف
          oppMatchPts = newOppPts;
          document.getElementById('opp-pts-m').textContent = oppMatchPts;
          document.getElementById('match-status').innerHTML =
            '<span style="color:#FF6B6B;font-size:17px;font-weight:700">⚡ خصمك خطف السؤال!</span>';
          disableOptions();
          // أظهر الإجابة الصحيحة للاعب
          const btns = document.querySelectorAll('.option-btn');
          if (btns[currentQ.a]) btns[currentQ.a].classList.add('correct');
        } else {
          oppMatchPts = newOppPts;
          document.getElementById('opp-pts-m').textContent = oppMatchPts;
        }
        // انتقل للسؤال التالي دائماً — لا تعرض شاشة الخسارة هنا
        setTimeout(() => nextQuestion(), 2200);
      } else {
        oppMatchPts = newOppPts;
        document.getElementById('opp-pts-m').textContent = oppMatchPts;
        document.getElementById('match-status').textContent = '😅 خصمك أجاب خطأ!';
        setTimeout(() => nextQuestion(), 2000);
      }
    }
  }, 1500);
}

function disableOptions() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function nextQuestion() {
  clearInterval(qTimerInterval);
  const iAmSmaller = currentUser.id < opponent.id;
  if (iAmSmaller) loadNextQuestion();
  else pollForQuestion();
}

function endMatch(reason) {
  clearInterval(matchTotalTimer);
  clearInterval(qTimerInterval);

  sbFetch(`/rest/v1/system?id=eq.${currentUser.id}`, {
    method: 'PATCH', body: JSON.stringify({ match: 'off', question: 0, answer: 'none' })
  });

  const overlay = document.getElementById('win-overlay');
  overlay.classList.add('show');

  if (reason === 'win') {
    document.getElementById('win-emoji').textContent = '🏆';
    document.getElementById('win-title').textContent = 'أنت الفائز!';
    document.getElementById('win-sub').textContent = `وصلت إلى 50 نقطة! رائع!`;
  } else if (reason === 'lose') {
    document.getElementById('win-emoji').textContent = '😔';
    document.getElementById('win-title').textContent = 'خسرت المباراة';
    document.getElementById('win-sub').textContent = 'حاول مرة أخرى!';
  } else {
    const myWin = myMatchPts > oppMatchPts;
    document.getElementById('win-emoji').textContent = myWin ? '⏱️🏆' : '⏱️😔';
    document.getElementById('win-title').textContent = myWin ? 'انتهى الوقت - أنت الفائز!' : 'انتهى الوقت';
    document.getElementById('win-sub').textContent = `نقاطك: ${myMatchPts} | خصمك: ${oppMatchPts}`;
  }
}

function closeMatch() {
  document.getElementById('win-overlay').classList.remove('show');
  showPage('home');
  showDashboard();
}

// ==================== LEADERBOARD ====================
async function loadLeaderboard() {
  const data = await sbFetch('/rest/v1/system?select=name,country,points&order=points.desc&limit=20', { method: 'GET' });
  const el = document.getElementById('lb-list');
  if (!data || data.length === 0) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">لا يوجد لاعبون بعد</div>'; return; }
  const medals = ['🥇','🥈','🥉'];
  const rankClass = ['gold','silver','bronze'];
  el.innerHTML = data.map((u, i) => `
    <div class="lb-row">
      <div class="lb-rank ${rankClass[i]||''}">${medals[i] || (i+1)}</div>
      <div class="lb-avatar">${u.name ? u.name[0].toUpperCase() : '?'}</div>
      <div class="lb-info">
        <div class="lb-name">${u.name || 'لاعب'}</div>
        <div class="lb-country">${u.country || ''}</div>
      </div>
      <div class="lb-pts">${u.points || 0}</div>
    </div>
  `).join('');
}

// ==================== PROFILE ====================
function loadProfile() {
  if (!currentUser) return;
  document.getElementById('profile-info').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="avatar" style="width:70px;height:70px;font-size:28px">${currentUser.name[0].toUpperCase()}</div>
      <div>
        <div style="font-size:20px;font-weight:700">${currentUser.name}</div>
        <div style="color:var(--muted)">${currentUser.email}</div>
        <div style="color:var(--gold);margin-top:4px">${currentUser.country||''}</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="num">${currentUser.points||0}</div><div class="lbl">النقاط الكلية</div></div>
    </div>
  `;
}

// ==================== INIT ====================
const saved = localStorage.getItem('genius_user');
if (saved) {
  try {
    currentUser = JSON.parse(saved);
    // refresh from db
    sbFetch(`/rest/v1/system?id=eq.${currentUser.id}&select=*`, { method: 'GET' }).then(res => {
      if (res && res[0]) { currentUser = res[0]; localStorage.setItem('genius_user', JSON.stringify(currentUser)); }
      showDashboard();
    });
  } catch(e) { localStorage.removeItem('genius_user'); }
}
</script>
